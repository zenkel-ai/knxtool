name: Deploy to Hetzner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy via SSH to Hetzner
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: www728.your-server.de
          username: bzipjy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 222
          script: |
            set -e
            # WICHTIG: $HOME/html/knxtool ist NUR das SSH-Home-Verzeichnis und wird
            # von Apache nicht ausgeliefert. Das tatsächliche Web-Root liegt unter
            # public_html (Symlink auf /usr/www/users/bzipjy) - dorthin muss deployt werden.
            DEPLOY_DIR="$HOME/public_html/html/knxtool"

            # Sicherstellen dass der Ordner existiert
            mkdir -p "$(dirname "$DEPLOY_DIR")"

            # Repo klonen oder aktualisieren
            if [ -d "$DEPLOY_DIR/.git" ]; then
              echo "→ Pulling latest changes..."
              cd "$DEPLOY_DIR"
              git pull origin main
            else
              echo "→ Cloning repository (removing any stale non-git content first)..."
              rm -rf "$DEPLOY_DIR"
              git clone https://github.com/zenkel-ai/knxtool.git "$DEPLOY_DIR"
            fi

            echo "✓ Deployment erfolgreich: knxtool.seed2peak.group"
